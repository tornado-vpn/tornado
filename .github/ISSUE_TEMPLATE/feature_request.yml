name: "🚀 Feature Request"
description: "Suggest an idea for Tornado VPN"
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees:
  - ""
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please provide as much detail as possible to help us evaluate and implement it.
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? Let us know.
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen and how it could be implemented in Tornado VPN.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: A clear and concise description of any alternative solutions or features you've considered.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, wireframes, or screenshots about the feature request here.
