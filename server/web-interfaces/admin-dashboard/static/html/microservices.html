<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Microservice Management</title>
        <style>
            /* Instrument Sans */
            @font-face {
                font-family: "Instrument Sans";
                font-style: normal;
                font-weight: 400;
                font-display: swap;
                src: url("/static/fonts/instrument-sans-400-normal.woff2")
                    format("woff2");
            }
            @font-face {
                font-family: "Instrument Sans";
                font-style: normal;
                font-weight: 500;
                font-display: swap;
                src: url("/static/fonts/instrument-sans-500-normal.woff2")
                    format("woff2");
            }
            @font-face {
                font-family: "Instrument Sans";
                font-style: normal;
                font-weight: 600;
                font-display: swap;
                src: url("/static/fonts/instrument-sans-600-normal.woff2")
                    format("woff2");
            }
            @font-face {
                font-family: "Instrument Sans";
                font-style: normal;
                font-weight: 700;
                font-display: swap;
                src: url("/static/fonts/instrument-sans-700-normal.woff2")
                    format("woff2");
            }
            @font-face {
                font-family: "Instrument Sans";
                font-style: italic;
                font-weight: 400;
                font-display: swap;
                src: url("/static/fonts/instrument-sans-400-italic.woff2")
                    format("woff2");
            }

            /* Geist Mono */
            @font-face {
                font-family: "Geist Mono";
                font-style: normal;
                font-weight: 300;
                font-display: swap;
                src: url("/static/fonts/geist-mono-300-normal.woff2")
                    format("woff2");
            }
            @font-face {
                font-family: "Geist Mono";
                font-style: normal;
                font-weight: 400;
                font-display: swap;
                src: url("/static/fonts/geist-mono-400-normal.woff2")
                    format("woff2");
            }
            @font-face {
                font-family: "Geist Mono";
                font-style: normal;
                font-weight: 500;
                font-display: swap;
                src: url("/static/fonts/geist-mono-500-normal.woff2")
                    format("woff2");
            }
            @font-face {
                font-family: "Geist Mono";
                font-style: normal;
                font-weight: 600;
                font-display: swap;
                src: url("/static/fonts/geist-mono-600-normal.woff2")
                    format("woff2");
            }
            :root {
                --bg: #f5f6f8;
                --bg1: #ffffff;
                --bg2: #f5f6f8;
                --bg3: #eef0f5;
                --bg4: #e2e5ec;
                --border: #d9dce0;
                --border2: #c4c8d0;
                --text: #1a1f36;
                --text2: #3a3f5c;
                --text3: #6c757d;
                --text4: #9ba3af;
                --accent: #0066cc;
                --accent2: #0052a3;
                --accent-glow: rgba(0, 102, 204, 0.12);
                --red: #dc3545;
                --red-bg: rgba(220, 53, 69, 0.08);
                --red-border: rgba(220, 53, 69, 0.25);
                --green: #28a745;
                --green-bg: rgba(40, 167, 69, 0.08);
                --green-border: rgba(40, 167, 69, 0.2);
                --amber: #d97706;
                --amber-bg: rgba(217, 119, 6, 0.08);
                --amber-border: rgba(217, 119, 6, 0.2);
                --info: #0891b2;
                --info-bg: rgba(8, 145, 178, 0.08);
                --purple: #6d28d9;
                --purple-bg: rgba(109, 40, 217, 0.08);
                --font: "Instrument Sans", system-ui, sans-serif;
                --mono: "Geist Mono", monospace;
                --radius: 8px;
                --radius-lg: 12px;
                --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
                --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.12);
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html,
            body {
                height: 100%;
                font-family: var(--font);
                background: var(--bg);
                color: var(--text);
                -webkit-font-smoothing: antialiased;
                font-size: 14px;
            }

            ::-webkit-scrollbar {
                width: 5px;
                height: 5px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: var(--border2);
                border-radius: 3px;
            }

            /* ── Layout ── */
            .app {
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }

            /* ── Topbar ── */
            .topbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 24px;
                height: 52px;
                background: var(--bg1);
                border-bottom: 1px solid var(--border);
                position: sticky;
                top: 0;
                z-index: 50;
                box-shadow: var(--shadow);
                flex-shrink: 0;
            }
            .topbar-left {
                display: flex;
                align-items: center;
                gap: 16px;
            }
            .brand {
                display: flex;
                align-items: center;
                gap: 10px;
                text-decoration: none;
                color: inherit;
            }
            .brand-icon {
                width: 28px;
                height: 28px;
                border-radius: 7px;
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--purple)
                );
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 2px 8px var(--accent-glow);
            }
            .brand-icon img {
                width: 20px;
                height: 20px;
                filter: brightness(0) invert(1);
            }
            .brand-name {
                font-size: 15px;
                font-weight: 700;
                letter-spacing: -0.3px;
            }
            .brand-sub {
                font-size: 11px;
                color: var(--text3);
                font-family: var(--mono);
                letter-spacing: 0.5px;
            }

            .topbar-right {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            /* ── Topbar Buttons ── */
            .topbar-btn {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 5px 12px;
                border-radius: 6px;
                border: 1px solid var(--border);
                background: var(--bg2);
                color: var(--text2);
                font-size: 12px;
                font-weight: 600;
                font-family: var(--font);
                cursor: pointer;
                transition: all 0.15s;
                white-space: nowrap;
            }
            .topbar-btn img {
                width: 14px;
                height: 14px;
                opacity: 0.6;
            }
            .topbar-btn:hover {
                background: var(--bg3);
                border-color: var(--border2);
                color: var(--text);
            }
            .topbar-btn:hover img {
                opacity: 0.9;
            }
            .topbar-btn.primary {
                background: var(--accent);
                color: #fff;
                border-color: var(--accent);
            }
            .topbar-btn.primary img {
                filter: brightness(0) invert(1);
                opacity: 1;
            }
            .topbar-btn.primary:hover {
                background: var(--accent2);
                border-color: var(--accent2);
            }

            /* ── Page ── */
            .page {
                padding: 24px;
                max-width: 1600px;
                margin: 0 auto;
                width: 100%;
            }

            /* ── Section header ── */
            .section-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 14px;
                margin-top: 28px;
            }
            .section-header:first-child {
                margin-top: 0;
            }
            .section-title {
                font-size: 10px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.7px;
                color: var(--text3);
            }

            /* ── KPI Cards ── */
            .kpi-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
                margin-bottom: 28px;
            }
            .kpi-card {
                background: var(--bg1);
                border: 1px solid var(--border);
                border-radius: var(--radius-lg);
                padding: 16px;
                position: relative;
                overflow: hidden;
                transition: all 0.2s;
                box-shadow: var(--shadow);
            }
            .kpi-card::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 3px;
                border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            }
            .kpi-card.blue::after {
                background: linear-gradient(
                    90deg,
                    var(--accent),
                    var(--purple)
                );
            }
            .kpi-card.green::after {
                background: var(--green);
            }
            .kpi-card.amber::after {
                background: var(--amber);
            }
            .kpi-card.red::after {
                background: var(--red);
            }
            .kpi-card:hover {
                border-color: var(--border2);
                transform: translateY(-2px);
                box-shadow: var(--shadow-lg);
            }

            .kpi-top {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                margin-bottom: 12px;
            }
            .kpi-icon-wrap {
                width: 36px;
                height: 36px;
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }
            .kpi-icon-wrap img {
                width: 25px;
                height: 25px;
            }
            .blue .kpi-icon-wrap {
                background: var(--accent-glow);
            }
            .blue .kpi-icon-wrap img {
                filter: invert(29%) sepia(89%) saturate(1562%)
                    hue-rotate(196deg) brightness(97%) contrast(101%);
            }
            .green .kpi-icon-wrap {
                background: var(--green-bg);
            }
            .green .kpi-icon-wrap img {
                filter: invert(44%) sepia(72%) saturate(426%) hue-rotate(83deg)
                    brightness(95%) contrast(90%);
            }
            .amber .kpi-icon-wrap {
                background: var(--amber-bg);
            }
            .amber .kpi-icon-wrap img {
                filter: invert(50%) sepia(60%) saturate(800%) hue-rotate(10deg)
                    brightness(95%) contrast(95%);
            }
            .red .kpi-icon-wrap {
                background: var(--red-bg);
            }
            .red .kpi-icon-wrap img {
                filter: invert(27%) sepia(85%) saturate(1200%)
                    hue-rotate(334deg) brightness(95%) contrast(95%);
            }

            .kpi-label {
                font-size: 10px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.6px;
                color: var(--text3);
                margin-bottom: 6px;
                font-family: var(--font);
            }
            .kpi-val {
                font-size: 26px;
                font-weight: 700;
                letter-spacing: -1px;
                line-height: 1;
                font-family: var(--mono);
                margin-bottom: 6px;
            }
            .blue .kpi-val {
                color: var(--accent);
            }
            .green .kpi-val {
                color: var(--green);
            }
            .amber .kpi-val {
                color: var(--amber);
            }
            .red .kpi-val {
                color: var(--red);
            }
            .kpi-sub {
                font-size: 11px;
                color: var(--text3);
                font-family: var(--font);
            }
            .kpi-badge {
                display: inline-flex;
                align-items: center;
                gap: 3px;
                padding: 2px 6px;
                border-radius: 4px;
                font-size: 10px;
                font-weight: 600;
                font-family: var(--mono);
            }
            .kpi-badge.neutral {
                background: var(--bg3);
                color: var(--text3);
            }
            .kpi-badge.up {
                background: var(--green-bg);
                color: var(--green);
            }
            .kpi-badge.down {
                background: var(--red-bg);
                color: var(--red);
            }
            .kpi-badge.warn {
                background: var(--amber-bg);
                color: var(--amber);
            }

            /* ── Services Grid ── */
            .services-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 14px;
                margin-bottom: 28px;
            }

            /* ── Service Card ── */
            .service-card {
                background: var(--bg1);
                border: 1px solid var(--border);
                border-radius: var(--radius-lg);
                overflow: hidden;
                box-shadow: var(--shadow);
                transition: all 0.2s;
                position: relative;
            }

            .service-card:hover {
                border-color: var(--border2);
                transform: translateY(-2px);
                box-shadow: var(--shadow-lg);
            }

            /* loading overlay */
            .service-card.loading {
                pointer-events: none;
            }
            .service-card.loading::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(255, 255, 255, 0.7);
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: var(--radius-lg);
                z-index: 5;
            }
            .service-card.loading .svc-spinner {
                display: flex;
            }

            .svc-spinner {
                display: none;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 10;
                width: 28px;
                height: 28px;
                border: 3px solid var(--border);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spin 0.7s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: translate(-50%, -50%) rotate(360deg);
                }
            }

            /* Card head */
            .svc-head {
                padding: 14px 16px 12px;
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                border-bottom: 1px solid var(--border);
                background: var(--bg2);
            }
            .svc-head-left {
                display: flex;
                align-items: center;
                gap: 10px;
                flex: 1;
                min-width: 0;
            }
            .svc-icon-wrap {
                width: 34px;
                height: 34px;
                border-radius: 8px;
                flex-shrink: 0;
                background: var(--accent-glow);
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .svc-icon-wrap img {
                width: 20px;
                height: 20px;
                filter: invert(29%) sepia(89%) saturate(1562%)
                    hue-rotate(196deg) brightness(97%) contrast(101%);
            }
            .svc-name {
                font-size: 13px;
                font-weight: 700;
                color: var(--text);
                letter-spacing: -0.2px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                font-family: var(--font);
            }
            .svc-pid {
                font-size: 10px;
                color: var(--text4);
                font-family: var(--mono);
                margin-top: 2px;
            }

            /* Status badge */
            .svc-status {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                padding: 3px 8px;
                border-radius: 4px;
                font-size: 10px;
                font-weight: 700;
                font-family: var(--mono);
                flex-shrink: 0;
                text-transform: uppercase;
                letter-spacing: 0.4px;
            }
            .svc-status .sdot {
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background: currentColor;
            }
            .svc-status.running {
                background: var(--green-bg);
                color: var(--green);
                border: 1px solid var(--green-border);
            }
            .svc-status.running .sdot {
                animation: pulse-dot 1.5s ease-in-out infinite;
            }
            .svc-status.stopped {
                background: var(--bg3);
                color: var(--text3);
                border: 1px solid var(--border);
            }
            .svc-status.crashed {
                background: var(--red-bg);
                color: var(--red);
                border: 1px solid var(--red-border);
            }
            @keyframes pulse-dot {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.3;
                }
            }

            /* Card body — meta grid */
            .svc-body {
                padding: 12px 16px;
            }
            .svc-meta {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1px;
                background: var(--border);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                overflow: hidden;
                margin-bottom: 12px;
            }
            .svc-meta-item {
                padding: 10px 12px;
                background: var(--bg1);
            }
            .svc-meta-label {
                font-size: 9px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.6px;
                color: var(--text4);
                margin-bottom: 4px;
                font-family: var(--font);
            }
            .svc-meta-val {
                font-size: 12px;
                font-weight: 600;
                color: var(--text2);
                font-family: var(--mono);
            }
            .svc-meta-val.running {
                color: var(--green);
            }
            .svc-meta-val.stopped {
                color: var(--text3);
            }
            .svc-meta-val.crashed {
                color: var(--red);
            }
            .svc-meta-val.yes {
                color: var(--accent);
            }
            .svc-meta-val.no {
                color: var(--text4);
            }

            /* Action buttons row */
            .svc-actions {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
            }
            .svc-btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 5px;
                padding: 7px 10px;
                border-radius: var(--radius);
                border: 1px solid var(--border);
                background: var(--bg1);
                font-size: 11px;
                font-weight: 600;
                color: var(--text2);
                font-family: var(--font);
                cursor: pointer;
                transition: all 0.15s;
            }
            .svc-btn img {
                width: 16px;
                height: 16px;
                opacity: 0.5;
            }
            .svc-btn:disabled {
                opacity: 0.35;
                cursor: not-allowed;
                pointer-events: none;
            }
            .svc-btn:not(:disabled):hover {
                border-color: var(--border2);
                background: var(--bg3);
            }

            .svc-btn.start:not(:disabled):hover {
                border-color: var(--green-border);
                background: var(--green-bg);
                color: var(--green);
            }
            .svc-btn.start:not(:disabled):hover img {
                filter: invert(44%) sepia(72%) saturate(426%) hue-rotate(83deg)
                    brightness(95%) contrast(90%);
                opacity: 1;
            }
            .svc-btn.stop:not(:disabled):hover {
                border-color: var(--red-border);
                background: var(--red-bg);
                color: var(--red);
            }
            .svc-btn.stop:not(:disabled):hover img {
                filter: invert(27%) sepia(85%) saturate(1200%)
                    hue-rotate(334deg) brightness(95%) contrast(95%);
                opacity: 1;
            }
            .svc-btn.restart:not(:disabled):hover {
                border-color: var(--amber-border);
                background: var(--amber-bg);
                color: var(--amber);
            }
            .svc-btn.restart:not(:disabled):hover img {
                filter: invert(50%) sepia(60%) saturate(800%) hue-rotate(10deg)
                    brightness(95%) contrast(95%);
                opacity: 1;
            }

            /* ── Empty State ── */
            .empty-state {
                grid-column: 1 / -1;
                background: var(--bg1);
                border: 1px solid var(--border);
                border-radius: var(--radius-lg);
                padding: 56px 24px;
                text-align: center;
                box-shadow: var(--shadow);
            }
            .empty-state-icon {
                width: 48px;
                height: 48px;
                opacity: 0.25;
                margin: 0 auto 16px;
                display: block;
            }
            .empty-state-title {
                font-size: 14px;
                font-weight: 700;
                color: var(--text2);
                margin-bottom: 4px;
            }
            .empty-state-sub {
                font-size: 12px;
                color: var(--text4);
            }

            /* ── Error banner ── */
            .error-banner {
                background: var(--red-bg);
                border: 1px solid var(--red-border);
                color: var(--red);
                padding: 10px 14px;
                border-radius: var(--radius);
                margin-bottom: 16px;
                font-size: 12px;
                font-weight: 600;
                display: none;
            }
            .error-banner.show {
                display: block;
                animation: view-in 0.2s ease;
            }
            @keyframes view-in {
                from {
                    opacity: 0;
                    transform: translateY(-6px);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }

            /* ── Toast ── */
            .toast-container {
                position: fixed;
                top: 64px;
                right: 20px;
                z-index: 9999;
                display: flex;
                flex-direction: column;
                gap: 8px;
                max-width: 320px;
            }
            .toast {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 10px 14px;
                border-radius: var(--radius);
                background: var(--bg1);
                border: 1px solid var(--border);
                box-shadow: var(--shadow-lg);
                font-size: 12px;
                font-weight: 600;
                animation: toast-in 0.2s ease-out;
            }
            @keyframes toast-in {
                from {
                    opacity: 0;
                    transform: translateX(20px);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }
            .toast img,
            .toast svg {
                width: 14px;
                height: 14px;
                flex-shrink: 0;
            }
            .toast.success {
                border-left: 3px solid var(--green);
                color: var(--green);
                background: var(--green-bg);
                border-color: var(--green-border);
            }
            .toast.success img {
                filter: invert(44%) sepia(72%) saturate(426%) hue-rotate(83deg)
                    brightness(95%) contrast(90%);
            }
            .toast.error {
                border-left: 3px solid var(--red);
                color: var(--red);
                background: var(--red-bg);
                border-color: var(--red-border);
            }
            .toast.error img {
                filter: invert(27%) sepia(85%) saturate(1200%)
                    hue-rotate(334deg) brightness(95%) contrast(95%);
            }
            .toast.info {
                border-left: 3px solid var(--info);
                color: var(--info);
                background: var(--info-bg);
                border-color: rgba(8, 145, 178, 0.25);
            }
            .toast.info img {
                filter: invert(38%) sepia(80%) saturate(700%) hue-rotate(168deg)
                    brightness(90%) contrast(95%);
            }

            /* ── Modal ── */
            .modal-overlay {
                position: fixed;
                inset: 0;
                background: rgba(26, 31, 54, 0.45);
                backdrop-filter: blur(3px);
                z-index: 9998;
                display: none;
                align-items: center;
                justify-content: center;
            }
            .modal-overlay.active {
                display: flex;
                animation: fade-in 0.15s ease;
            }
            @keyframes fade-in {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }

            .modal {
                background: var(--bg1);
                border: 1px solid var(--border);
                border-radius: var(--radius-lg);
                padding: 24px;
                max-width: 420px;
                width: 90%;
                box-shadow: var(--shadow-lg);
                animation: modal-up 0.2s ease-out;
            }
            @keyframes modal-up {
                from {
                    opacity: 0;
                    transform: translateY(16px);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }
            .modal-head {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 12px;
            }
            .modal-head-icon {
                width: 32px;
                height: 32px;
                border-radius: 8px;
                flex-shrink: 0;
                background: var(--amber-bg);
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .modal-head-icon img {
                width: 15px;
                height: 15px;
                filter: invert(50%) sepia(60%) saturate(800%) hue-rotate(10deg)
                    brightness(95%) contrast(95%);
            }
            .modal-title {
                font-size: 14px;
                font-weight: 700;
                color: var(--text);
                font-family: var(--font);
            }
            .modal-body {
                font-size: 13px;
                color: var(--text3);
                line-height: 1.6;
                margin-bottom: 20px;
                padding-left: 42px;
            }
            .modal-body strong {
                color: var(--text2);
                font-weight: 600;
            }
            .modal-footer {
                display: flex;
                gap: 8px;
                justify-content: flex-end;
            }

            .modal-btn {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 7px 16px;
                border-radius: var(--radius);
                font-size: 12px;
                font-weight: 600;
                font-family: var(--font);
                border: 1px solid var(--border);
                background: var(--bg2);
                color: var(--text2);
                cursor: pointer;
                transition: all 0.15s;
            }
            .modal-btn:hover {
                background: var(--bg3);
                border-color: var(--border2);
            }
            .modal-btn.confirm {
                background: var(--accent);
                color: #fff;
                border-color: var(--accent);
            }
            .modal-btn.confirm:hover {
                background: var(--accent2);
                border-color: var(--accent2);
            }
            .modal-btn.danger {
                background: var(--red);
                color: #fff;
                border-color: var(--red);
            }
            .modal-btn.danger:hover {
                background: #b02a37;
                border-color: #b02a37;
            }

            /* ── Responsive ── */
            @media (max-width: 1200px) {
                .services-grid {
                    grid-template-columns: repeat(2, 1fr);
                }
                .kpi-grid {
                    grid-template-columns: repeat(2, 1fr);
                }
            }

            @media (max-width: 768px) {
                .page {
                    padding: 14px;
                }
                .kpi-grid {
                    grid-template-columns: repeat(2, 1fr);
                }
                .services-grid {
                    grid-template-columns: 1fr;
                }
            }
            @media (max-width: 480px) {
                .kpi-grid {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
    <body>
        <div class="app">
            <!-- ── Topbar ── -->
            <header class="topbar">
                <div class="topbar-left">
                    <a class="brand" href="#">
                        <div class="brand-icon">
                            <img src="static/icons/micro.svg" alt="brand" />
                        </div>
                        <div>
                            <div class="brand-name">SysMon</div>
                            <div class="brand-sub">Microservices</div>
                        </div>
                    </a>
                </div>
                <div class="topbar-right">
                    <button class="topbar-btn" onclick="refreshStatus()">
                        <img src="static/icons/refresh_circle.svg" alt="refresh" />
                        Refresh
                    </button>
                    <button class="topbar-btn primary" onclick="reloadConfig()">
                        <img src="static/icons/reload.svg" alt="reload" />
                        Reload Config
                    </button>
                </div>
            </header>

            <!-- ── Toast Container ── -->
            <div class="toast-container" id="toastContainer"></div>

            <!-- ── Confirm Modal ── -->
            <div class="modal-overlay" id="modalOverlay">
                <div class="modal">
                    <div class="modal-head">
                        <div class="modal-head-icon">
                            <img src="/static/icons/alert.svg" alt="alert" />
                        </div>
                        <div class="modal-title" id="modalTitle">
                            Confirm Action
                        </div>
                    </div>
                    <div class="modal-body" id="modalBody">
                        Are you sure you want to proceed?
                    </div>
                    <div class="modal-footer">
                        <button class="modal-btn" onclick="closeModal()">
                            Cancel
                        </button>
                        <button class="modal-btn confirm" id="modalConfirmBtn">
                            Confirm
                        </button>
                    </div>
                </div>
            </div>

            <!-- ── Page ── -->
            <div class="page">
                <div class="error-banner" id="errorBanner"></div>

                <!-- ── KPI SUMMARY ── -->
                <div class="section-header">
                    <span class="section-title">Service Overview</span>
                    <span
                        style="
                            font-size: 11px;
                            color: var(--text4);
                            font-family: var(--mono);
                        "
                        id="lastRefreshed"
                        >—</span
                    >
                </div>

                <div class="kpi-grid">
                    <!-- Total -->
                    <div class="kpi-card blue">
                        <div class="kpi-top">
                            <div class="kpi-icon-wrap">
                                <img src="static/icons/server.svg" alt="total" />
                            </div>
                            <span class="kpi-badge neutral">All</span>
                        </div>
                        <div class="kpi-label">Total Services</div>
                        <div class="kpi-val" id="kpiTotal">—</div>
                        <div class="kpi-sub">Configured services</div>
                    </div>

                    <!-- Running -->
                    <div class="kpi-card green">
                        <div class="kpi-top">
                            <div class="kpi-icon-wrap">
                                <img src="static/icons/running.svg" alt="running" />
                            </div>
                            <span class="kpi-badge up" id="kpiRunningBadge"
                                >—</span
                            >
                        </div>
                        <div class="kpi-label">Running</div>
                        <div class="kpi-val" id="kpiRunning">—</div>
                        <div class="kpi-sub">Active services</div>
                    </div>

                    <!-- Stopped -->
                    <div class="kpi-card amber">
                        <div class="kpi-top">
                            <div class="kpi-icon-wrap">
                                <img src="static/icons/stop.svg" alt="stopped" />
                            </div>
                            <span class="kpi-badge neutral" id="kpiStoppedBadge"
                                >—</span
                            >
                        </div>
                        <div class="kpi-label">Stopped</div>
                        <div class="kpi-val" id="kpiStopped">—</div>
                        <div class="kpi-sub">Inactive services</div>
                    </div>

                    <!-- Crashed -->
                    <div class="kpi-card red">
                        <div class="kpi-top">
                            <div class="kpi-icon-wrap">
                                <img src="static/icons/alert.svg" alt="crashed" />
                            </div>
                            <span class="kpi-badge down" id="kpiCrashedBadge"
                                >—</span
                            >
                        </div>
                        <div class="kpi-label">Crashed</div>
                        <div class="kpi-val" id="kpiCrashed">—</div>
                        <div class="kpi-sub">Needs attention</div>
                    </div>
                </div>

                <!-- ── SERVICES ── -->
                <div class="section-header">
                    <span class="section-title">Services</span>
                    <span
                        style="
                            font-size: 11px;
                            color: var(--text4);
                            font-family: var(--mono);
                        "
                        id="serviceCount"
                        >0 services</span
                    >
                </div>

                <div class="services-grid" id="servicesGrid">
                    <!-- Populated by JS -->
                </div>
            </div>
            <!-- end .page -->
        </div>
        <!-- end .app -->

        <script>
            let services = [];
            let currentAction = null;

            // ── API ──────────────────────────────────────────────────────────────────

            async function fetchStatus() {
                try {
                    const r = await fetch("/api/system/status");
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    const data = await r.json();
                    services = data.services || [];
                    renderServices();
                    updateKpis();
                    document.getElementById("lastRefreshed").textContent =
                        "Updated " +
                        new Date().toLocaleTimeString("en-US", {
                            hour12: false,
                        });
                } catch (e) {
                    showError("Failed to fetch service status: " + e.message);
                }
            }

            async function controlService(serviceName, action) {
                const card = document.querySelector(
                    `[data-service="${serviceName}"]`,
                );
                if (card) card.classList.add("loading");

                try {
                    const r = await fetch("/api/system/control", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            action,
                            service_name: serviceName,
                        }),
                    });
                    const data = await r.json();
                    if (!r.ok || data.status === "error")
                        throw new Error(data.message || `Failed to ${action}`);
                    showToast(
                        `${capitalize(action)}ed ${serviceName}`,
                        "success",
                    );
                    setTimeout(fetchStatus, 1000);
                } catch (e) {
                    showToast(
                        e.message || `Failed to ${action} ${serviceName}`,
                        "error",
                    );
                } finally {
                    if (card) card.classList.remove("loading");
                }
            }

            async function reloadConfig() {
                try {
                    const r = await fetch("/api/system/control", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            action: "reload_config",
                            service_name: "all",
                        }),
                    });
                    const data = await r.json();
                    if (!r.ok || data.status === "error")
                        throw new Error(
                            data.message || "Failed to reload config",
                        );
                    showToast(
                        data.message || "Configuration reloaded",
                        "success",
                    );
                    setTimeout(fetchStatus, 1000);
                } catch (e) {
                    showToast(
                        e.message || "Failed to reload configuration",
                        "error",
                    );
                }
            }

            // ── RENDER ───────────────────────────────────────────────────────────────

            function renderServices() {
                const grid = document.getElementById("servicesGrid");
                document.getElementById("serviceCount").textContent =
                    `${services.length} service${services.length !== 1 ? "s" : ""}`;

                if (!services.length) {
                    grid.innerHTML = `
                <div class="empty-state">
                    <img src="icons/box.svg" alt="empty" class="empty-state-icon"/>
                    <div class="empty-state-title">No Services Found</div>
                    <div class="empty-state-sub">No microservices are currently configured</div>
                </div>`;
                    return;
                }

                grid.innerHTML = services
                    .map((svc) => {
                        const state = svc.state || "stopped";
                        const isRunning = state === "running";
                        const isStopped = state === "stopped";
                        const shouldRun = svc.should_be_running;

                        return `
            <div class="service-card ${state}" data-service="${svc.name}">
                <div class="svc-spinner"></div>

                <!-- Head -->
                <div class="svc-head">
                    <div class="svc-head-left">
                        <div class="svc-icon-wrap">
                            <img src="static/icons/microservice.svg" alt="svc"/>
                        </div>
                        <div style="min-width:0">
                            <div class="svc-name" title="${svc.name}">${svc.name}</div>
                            <div class="svc-pid">${svc.pid ? "PID " + svc.pid : "No process"}</div>
                        </div>
                    </div>
                    <div class="svc-status ${state}">
                        <span class="sdot"></span>
                        ${state.toUpperCase()}
                    </div>
                </div>

                <!-- Body -->
                <div class="svc-body">
                    <div class="svc-meta">
                        <div class="svc-meta-item">
                            <div class="svc-meta-label">State</div>
                            <div class="svc-meta-val ${state}">${capitalize(state)}</div>
                        </div>
                        <div class="svc-meta-item">
                            <div class="svc-meta-label">Should Run</div>
                            <div class="svc-meta-val ${shouldRun ? "yes" : "no"}">${shouldRun ? "Yes" : "No"}</div>
                        </div>
                    </div>

                    <div class="svc-actions">
                        <button class="svc-btn start" onclick="confirmAction('${svc.name}','start')" ${isRunning ? "disabled" : ""}>
                            <img src="static/icons/play.svg" alt="start"/>
                            Start
                        </button>
                        <button class="svc-btn stop" onclick="confirmAction('${svc.name}','stop')" ${isStopped ? "disabled" : ""}>
                            <img src="static/icons/stop.svg" alt="stop"/>
                            Stop
                        </button>
                        <button class="svc-btn restart" onclick="confirmAction('${svc.name}','restart')" ${isStopped ? "disabled" : ""}>
                            <img src="static/icons/restart.svg" alt="restart"/>
                            Restart
                        </button>
                    </div>
                </div>
            </div>`;
                    })
                    .join("");
            }

            function updateKpis() {
                const total = services.length;
                const running = services.filter(
                    (s) => s.state === "running",
                ).length;
                const stopped = services.filter(
                    (s) => s.state === "stopped",
                ).length;
                const crashed = services.filter(
                    (s) => s.state === "crashed",
                ).length;

                document.getElementById("kpiTotal").textContent = total;
                document.getElementById("kpiRunning").textContent = running;
                document.getElementById("kpiStopped").textContent = stopped;
                document.getElementById("kpiCrashed").textContent = crashed;

                const pct = total > 0 ? Math.round((running / total) * 100) : 0;
                document.getElementById("kpiRunningBadge").textContent =
                    pct + "%";
                document.getElementById("kpiStoppedBadge").textContent =
                    stopped > 0 ? stopped + " idle" : "None";
                document.getElementById("kpiCrashedBadge").textContent =
                    crashed > 0 ? "!" + crashed : "OK";
            }

            // ── MODAL ────────────────────────────────────────────────────────────────

            function confirmAction(serviceName, action) {
                currentAction = { serviceName, action };
                document.getElementById("modalTitle").textContent =
                    `${capitalize(action)} Service`;
                document.getElementById("modalBody").innerHTML =
                    `Are you sure you want to <strong>${action}</strong> the service <strong>${serviceName}</strong>?`;

                const btn = document.getElementById("modalConfirmBtn");
                btn.className =
                    action === "stop"
                        ? "modal-btn danger"
                        : "modal-btn confirm";
                btn.textContent = capitalize(action);

                document.getElementById("modalOverlay").classList.add("active");
            }

            function closeModal() {
                document
                    .getElementById("modalOverlay")
                    .classList.remove("active");
                currentAction = null;
            }

            document
                .getElementById("modalConfirmBtn")
                .addEventListener("click", () => {
                    if (currentAction) {
                        controlService(
                            currentAction.serviceName,
                            currentAction.action,
                        );
                        closeModal();
                    }
                });

            document
                .getElementById("modalOverlay")
                .addEventListener("click", (e) => {
                    if (e.target.id === "modalOverlay") closeModal();
                });

            // ── TOAST ────────────────────────────────────────────────────────────────

            const TOAST_ICONS = {
  success: `<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="currentColor" opacity="0.15"/><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/><path d="M7.5 12.5l3 3 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  error:   `<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="currentColor" opacity="0.15"/><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/><path d="M15 9l-6 6M9 9l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
  info:    `<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="currentColor" opacity="0.15"/><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/><path d="M12 11v5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="7.5" r="1" fill="currentColor"/></svg>`,
};

            function showToast(message, type = "info") {
    const container = document.getElementById("toastContainer");
    const el = document.createElement("div");
    el.className = `toast ${type}`;
    
    // Notice we removed the <img src="..."> and just dropped in the SVG directly
    el.innerHTML = `${TOAST_ICONS[type]} <span>${message}</span>`;
    
    container.appendChild(el);
    setTimeout(() => {
        el.style.opacity = "0";
        el.style.transform = "translateX(20px)";
        el.style.transition = "all 0.2s ease";
        setTimeout(() => el.remove(), 200);
    }, 4000);
}

            function showError(msg) {
                const el = document.getElementById("errorBanner");
                el.textContent = msg;
                el.classList.add("show");
                setTimeout(() => el.classList.remove("show"), 5000);
            }

            // ── HELPERS ──────────────────────────────────────────────────────────────

            function capitalize(s) {
                return s.charAt(0).toUpperCase() + s.slice(1);
            }

            function refreshStatus() {
                showToast("Refreshing…", "info");
                fetchStatus();
            }

            // ── INIT ─────────────────────────────────────────────────────────────────

            document.addEventListener("DOMContentLoaded", fetchStatus);
        </script>
    </body>
</html>
